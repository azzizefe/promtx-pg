services:
  redis-master:
    image: redis:7-alpine
    container_name: promtx-redis-master
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --appendonly yes
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    networks:
      promtx-network:
        ipv4_address: 172.20.0.13

  redis-slave:
    image: redis:7-alpine
    container_name: promtx-redis-slave
    command: redis-server --slaveof promtx-redis-master 6379 --masterauth ${REDIS_PASSWORD:-redis} --requirepass ${REDIS_PASSWORD:-redis}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    depends_on:
      - redis-master
    networks:
      promtx-network:
        ipv4_address: 172.20.0.14

  sentinel-1:
    image: redis:7-alpine
    container_name: promtx-sentinel-1
    ports:
      - "26379:26379"
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel1.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-slave
    networks:
      promtx-network:
        ipv4_address: 172.20.0.20

  sentinel-2:
    image: redis:7-alpine
    container_name: promtx-sentinel-2
    ports:
      - "26380:26379"
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel2.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-slave
    networks:
      promtx-network:
        ipv4_address: 172.20.0.21

  sentinel-3:
    image: redis:7-alpine
    container_name: promtx-sentinel-3
    ports:
      - "26381:26379"
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel3.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-slave
    networks:
      promtx-network:
        ipv4_address: 172.20.0.22

networks:
  promtx-network:
    external: true
