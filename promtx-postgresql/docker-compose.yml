services:
  postgres:
    image: postgres:16-alpine
    container_name: promtx-postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./docker/postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: promtx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d promtx"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      promtx-network:
        ipv4_address: 172.20.0.10

  redis:
    image: redis:7-alpine
    container_name: promtx-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      promtx-network:
        ipv4_address: 172.20.0.11

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: promtx-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@promtx.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
    networks:
      promtx-network:
        ipv4_address: 172.20.0.12

volumes:
  pgdata:
  redis-data:

networks:
  promtx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
