services:
  postgres:
    command: ["postgres", "-c", "log_statement=all"]
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  pgadmin:
    ports:
      - "5050:80"
    profiles:
      - dev

  prisma-studio:
    image: node:20-alpine
    container_name: promtx-prisma-studio
    working_dir: /app
    volumes:
      - .:/app
    command: npx prisma studio --port 5555
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
